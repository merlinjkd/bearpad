name: bearpad
title: Bearpad
adopt-info: bearpad
icon: src-tauri/icons/128x128.png
summary: The Notepad equivalent for Markdown
description: |
  A lightweight, minimalist Markdown viewer and text editor built for productivity across Windows, macOS, and Linux.
  Features:
  -   Tabbed interface
  -   Monaco editor
  -   Split view
  -   Syntax highlighting both in editor and code blocks
  -   Math equation support (KaTeX)
  -   Mermaid diagram support
  -   Vim mode
  -   Auto-reload
  -   Zen mode
  -   Custom typography and font settings
  -   Content zooming
  -   Image and YouTube embeds
  -   Familiar GitHub styled markdown rendering
  -   Tiny memory usage (~10MB)
  -   No telemetry or bloat
  -   Free and open-source
  -   Lightweight native UI
license: BSD-3-Clause
website: https://bearpad.sftwr.dev
donation: https://github.com/sponsors/alecdotdev
source-code: https://github.com/merlinjkd/bearpad
issues: https://github.com/merlinjkd/bearpad/issues

confinement: strict
base: core24
grade: stable

apps:
  bearpad:
    command: bin/bearpad
    desktop: usr/share/applications/bearpad.desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - wayland
      - home

parts:
  bearpad:
    plugin: rust
    source: .
    build-packages:
      - libwebkit2gtk-4.1-dev
      - build-essential
      - curl
      - wget
      - file
      - libssl-dev
      - libgtk-3-dev
      - libappindicator3-dev
      - librsvg2-dev
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libsoup-3.0-0
      - libjavascriptcoregtk-4.1-0
    build-snaps:
      - node/20/stable
    override-build: |
      set -e
      craftctl set version="$(node -p "require('./package.json').version")"
      npm install
      export CARGO_BUILD_JOBS=2
      npx tauri build --no-bundle
      
      # The binary is built in src-tauri/target/release/
      install -D -m755 src-tauri/target/release/Bearpad $CRAFT_PART_INSTALL/bin/bearpad
      
      # Install the icon
      install -D -m644 src-tauri/icons/128x128.png $CRAFT_PART_INSTALL/usr/share/icons/hicolor/128x128/apps/bearpad.png
      install -D -m644 src-tauri/icons/32x32.png $CRAFT_PART_INSTALL/usr/share/icons/hicolor/32x32/apps/bearpad.png
      
      # Install the desktop file
      cat << EOF > bearpad.desktop
      [Desktop Entry]
      Name=Bearpad
      Exec=bearpad
      Icon=bearpad
      Type=Application
      Categories=Utility;TextEditor;
      MimeType=text/markdown;text/plain;
      EOF
      install -D -m644 bearpad.desktop $CRAFT_PART_INSTALL/usr/share/applications/bearpad.desktop
